# 允许Bean定义覆盖
spring.main.allow-bean-definition-overriding=true
# Server Configuration
server.port=8080
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
# WebSocket Configuration
spring.websocket.allowed-origins=*
websocket.endpoint=/websocket
# Application Configuration
sorting.max-teaching-size=100
sorting.max-performance-size=1000
sorting.default-interval=1000
# Logging Configuration
logging.level.com.sorting.visualization=INFO
logging.level.org.springframework.web.socket=WARN
logging.level.org.springframework.messaging=WARN
logging.level.org.apache.tomcat=WARN
logging.file.name=logs/sorting-visualization.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
# Person Validation Rules
person.age.min=0
person.age.max=120
person.score.min=0
person.score.max=150
# Thread Pool Configuration
task.pool.core-size=10
task.pool.max-size=50
task.pool.queue-capacity=1000
# ========== DataSource Configuration (MySQL 8.0) ==========
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/sorting_visualization?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&allowMultiQueries=true
spring.datasource.username=root
spring.datasource.password=fuzhanpeng602
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.druid.initial-size=5
spring.datasource.druid.min-idle=5
spring.datasource.druid.max-active=20

# ========== MyBatis-Plus Configuration ==========
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.sorting.visualization.entity
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true

# ========== SQL 初始化脚本（首次启动时执行） ==========
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/data.sql

# ========== JWT Configuration ==========
jwt.secret=sortviz-2026-secret-key-for-database-course-design
jwt.expiration=86400000
